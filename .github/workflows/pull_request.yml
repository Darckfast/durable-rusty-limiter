name: PR
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "**"
      - "!**.md"
      - "!.github/images/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
      - run: pnpm i
      - run: pnpm run test
