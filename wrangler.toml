name = "durable-rusty-limiter"
main = "build/index.js"
compatibility_date = "2026-07-05"
workers_dev = false
preview_urls = false

[build]
command = "cargo install -q \"worker-build@^0.8\" && worker-build --release"

[observability.logs]
enabled = true

[vars]
COOLDOWN_IN_MS = "60000"
MAX_REQ_PER_SEC = "10"

[durable_objects]
bindings = [
  { name = "RUSTY_LIMITER", class_name = "RustyLimiter" }
]

[[migrations]]
tag = "v1" 
new_sqlite_classes = ["RustyLimiter"] 
